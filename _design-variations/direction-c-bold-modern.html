<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direction C: Bold Modern — Pink Milk Social Engine</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            /* Direction C: Bold Modern — High contrast, single accent */
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --bg-elevated: #22222f;
            
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-tertiary: #606070;
            
            --accent-neon: #00f5d4;
            --accent-neon-dim: rgba(0, 245, 212, 0.1);
            --accent-neon-glow: rgba(0, 245, 212, 0.4);
            
            --success: #00d9a5;
            --warning: #ffaa00;
            
            --font-family: 'Space Grotesk', system-ui, sans-serif;
            
            --shadow-glow: 0 0 20px var(--accent-neon-glow);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
            
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            overflow: hidden;
            height: 100vh;
        }

        .app-layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .top-nav {
            height: 70px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--bg-tertiary);
            display: flex;
            align-items: center;
            padding: 0 32px;
            gap: 24px;
        }

        .brand {
            font-size: 22px;
            font-weight: 500;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand::before {
            content: '';
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-neon);
            box-shadow: 0 0 10px var(--accent-neon);
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 10px var(--accent-neon); }
            50% { box-shadow: 0 0 20px var(--accent-neon), 0 0 40px var(--accent-neon-glow); }
        }

        .brand span {
            color: var(--accent-neon);
            font-weight: 300;
        }

        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Direction C: Dark, minimal sidebar with neon accents */
        .sidebar {
            width: 300px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--bg-tertiary);
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 28px 24px;
            border-bottom: 1px solid var(--bg-tertiary);
        }

        .sidebar-header p {
            font-size: 11px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .sidebar-header h3 {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .step-btn {
            width: 100%;
            padding: 18px 24px;
            background: transparent;
            border: none;
            border-left: 3px solid transparent;
            color: var(--text-secondary);
            font-family: var(--font-family);
            font-size: 14px;
            font-weight: 400;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 200ms var(--ease-out-expo);
            position: relative;
        }

        .step-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .step-btn.active {
            background: var(--bg-tertiary);
            border-left-color: var(--accent-neon);
            color: var(--text-primary);
        }

        .step-btn.completed {
            color: var(--accent-neon);
        }

        .step-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-elevated);
            border: 1px solid var(--bg-tertiary);
            transition: all 200ms var(--ease-out-expo);
            flex-shrink: 0;
        }

        .step-btn:hover .step-icon {
            border-color: var(--text-tertiary);
        }

        .step-btn.active .step-icon {
            background: var(--accent-neon-dim);
            border-color: var(--accent-neon);
            box-shadow: 0 0 10px var(--accent-neon-glow);
        }

        .step-btn.completed .step-icon {
            background: var(--accent-neon);
            border-color: var(--accent-neon);
            color: var(--bg-primary);
        }

        .step-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .step-number {
            font-size: 11px;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        .step-btn.active .step-number {
            color: var(--accent-neon);
        }

        .step-name {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
        }

        /* Main content */
        .main-content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            background: var(--bg-primary);
        }

        .content-container {
            background: var(--bg-secondary);
            border: 1px solid var(--bg-tertiary);
            border-radius: 16px;
            padding: 32px;
            box-shadow: var(--shadow-card);
            max-width: 800px;
        }

        .container-header {
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--bg-tertiary);
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .container-header h2 {
            font-size: 28px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .step-indicator {
            font-size: 13px;
            color: var(--accent-neon);
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
        }

        .input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--bg-tertiary);
            border-radius: 10px;
            font-family: var(--font-family);
            font-size: 15px;
            color: var(--text-primary);
            background: var(--bg-tertiary);
            transition: all 200ms var(--ease-out-expo);
        }

        .input:focus {
            outline: none;
            border-color: var(--accent-neon);
            box-shadow: 0 0 0 3px var(--accent-neon-dim);
        }

        .input::placeholder {
            color: var(--text-tertiary);
        }

        .btn {
            padding: 14px 28px;
            border-radius: 10px;
            font-family: var(--font-family);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 200ms var(--ease-out-expo);
        }

        .btn-primary {
            background: var(--accent-neon);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            box-shadow: var(--shadow-glow);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border: 1px solid var(--bg-tertiary);
        }

        .btn-secondary:hover {
            background: var(--bg-tertiary);
            border-color: var(--text-tertiary);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(0, 217, 165, 0.1);
            color: var(--success);
            border: 1px solid rgba(0, 217, 165, 0.2);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .progress-bar {
            height: 3px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            overflow: hidden;
            margin-top: auto;
            margin: 24px;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-neon);
            box-shadow: 0 0 10px var(--accent-neon);
            transition: width 300ms var(--ease-out-expo);
        }

        .variation-label {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--accent-neon);
            color: var(--bg-primary);
            padding: 14px 24px;
            border-radius: 10px;
            font-family: var(--font-family);
            font-size: 14px;
            font-weight: 600;
        }

        .grid-lines {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            opacity: 0.03;
            background-image: 
                linear-gradient(var(--accent-neon) 1px, transparent 1px),
                linear-gradient(90deg, var(--accent-neon) 1px, transparent 1px);
            background-size: 50px 50px;
        }
    </style>
</head>
<body>
    <div class="grid-lines"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { motion } = window.Motion;

        const STEPS = [
            { id: 1, name: 'Concept', subtitle: 'Define your content strategy', icon: 'Lightbulb' },
            { id: 2, name: 'Copywriting', subtitle: 'Craft compelling text', icon: 'Type' },
            { id: 3, name: 'Visual Assets', subtitle: 'Create or select images', icon: 'Image' },
            { id: 4, name: 'Video Production', subtitle: 'Edit and produce video', icon: 'Video' },
            { id: 5, name: 'Thumbnail', subtitle: 'Design engaging thumbnails', icon: 'Frame' },
            { id: 6, name: 'Blog Post', subtitle: 'Write supporting article', icon: 'FileText' },
            { id: 7, name: 'Review', subtitle: 'Final quality check', icon: 'CheckCircle' },
            { id: 8, name: 'Publish', subtitle: 'Schedule and publish', icon: 'Calendar' }
        ];

        const Icon = ({ name, size = 20 }) => {
            const icons = {
                Lightbulb: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3L9 14"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>,
                Type: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>,
                Image: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>,
                Video: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="m22 8-6 4 6 4V8Z"/><rect x="2" y="6" width="14" height="12" rx="2"/></svg>,
                Frame: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 8h16"/><path d="M4 16h16"/></svg>,
                FileText: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>,
                CheckCircle: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
                Calendar: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            };
            return icons[name] || null;
        };

        function App() {
            const [currentStep, setCurrentStep] = useState(1);
            const [completedSteps] = useState([1, 2]);

            const progressPercent = ((currentStep) / STEPS.length) * 100;

            return (
                <div className="app-layout">
                    <header className="top-nav">
                        <div className="brand">Pink Milk <span>Social Engine</span></div>
                        <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: '20px' }}>
                            <span className="status-badge">
                                <span className="status-dot"></span>
                                Live Sync
                            </span>
                            <button className="btn btn-primary">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                                Publish Now
                            </button>
                        </div>
                    </header>

                    <div className="app-body">
                        <aside className="sidebar">
                            <div className="sidebar-header">
                                <p>Workflow</p>
                                <h3>Content Campaign</h3>
                            </div>

                            <nav>
                                {STEPS.map((step) => {
                                    const isActive = currentStep === step.id;
                                    const isCompleted = completedSteps.includes(step.id);
                                    
                                    return (
                                        <motion.button
                                            key={step.id}
                                            className={`step-btn ${isActive ? 'active' : ''} ${isCompleted ? 'completed' : ''}`}
                                            onClick={() => setCurrentStep(step.id)}
                                            whileHover={{ x: 4 }}
                                            whileTap={{ scale: 0.98 }}
                                            transition={{ duration: 0.15 }}
                                        >
                                            <div className="step-icon">
                                                {isCompleted && !isActive ? (
                                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                                                ) : (
                                                    <Icon name={step.icon} />
                                                )}
                                            </div>
                                            <div className="step-content">
                                                <div className="step-number">Step {String(step.id).padStart(2, '0')}</div>
                                                <div className="step-name">{step.name}</div>
                                            </div>
                                        </motion.button>
                                    );
                                })}
                            </nav>

                            <div className="progress-bar">
                                <div className="progress-fill" style={{ width: `${progressPercent}%` }} />
                            </div>
                        </aside>

                        <main className="main-content">
                            <motion.div 
                                className="content-container"
                                initial={{ opacity: 0, y: 20 }}
                                animate={{ opacity: 1, y: 0 }}
                                transition={{ duration: 0.4, ease: [0.16, 1, 0.3, 1] }}
                            >
                                <div className="container-header">
                                    <span className="step-indicator">Step {String(currentStep).padStart(2, '0')}</span>
                                    <h2>{STEPS[currentStep-1].name}</h2>
                                </div>
                                
                                <div className="form-group">
                                    <label className="form-label">Content Title</label>
                                    <input className="input" placeholder="Enter your content title..." />
                                </div>
                                
                                <div className="form-group">
                                    <label className="form-label">Description</label>
                                    <textarea className="input" rows="4" placeholder="Describe your content strategy..." style={{ resize: 'vertical', minHeight: '100px' }} />
                                </div>

                                <div style={{ display: 'flex', gap: '12px', justifyContent: 'flex-end', marginTop: '32px' }}>
                                    <button className="btn btn-secondary">Previous</button>
                                    <button className="btn btn-primary">Save & Continue →</button>
                                </div>
                            </motion.div>
                        </main>
                    </div>

                    <div className="variation-label">Direction C: Bold Modern</div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
