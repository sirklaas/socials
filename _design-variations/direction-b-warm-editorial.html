<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direction B: Warm Editorial — Pink Milk Social Engine</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            /* Direction B: Warm Editorial — huashu-design anti-slop: serif display */
            --warm-cream: #FDF8F3;
            --warm-beige: #F5EDE4;
            --warm-tan: #E8D5C4;
            --warm-rust: #B85C38;
            --warm-terracotta: #C17A53;
            --warm-brown: #5D4037;
            --warm-charcoal: #3D2914;
            
            --accent-olive: #6B7F59;
            --accent-gold: #D4A574;
            
            --font-display: 'Playfair Display', Georgia, serif;
            --font-body: 'Source Sans 3', system-ui, sans-serif;
            
            --shadow-soft: 0 2px 8px rgba(93, 64, 55, 0.06);
            --shadow-warm: 0 4px 16px rgba(184, 92, 56, 0.08);
            
            --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);
        }

        body {
            font-family: var(--font-body);
            background: var(--warm-cream);
            color: var(--warm-charcoal);
            line-height: 1.7;
            overflow: hidden;
            height: 100vh;
        }

        .app-layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .top-nav {
            height: 72px;
            background: white;
            border-bottom: 1px solid var(--warm-tan);
            display: flex;
            align-items: center;
            padding: 0 40px;
            gap: 24px;
        }

        .brand {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 500;
            color: var(--warm-brown);
            letter-spacing: -0.01em;
        }

        .brand span {
            color: var(--warm-rust);
            font-style: italic;
        }

        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Direction B: Organic, paper-like sidebar with warm tones */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, var(--warm-beige) 0%, var(--warm-cream) 100%);
            border-right: 1px solid var(--warm-tan);
            padding: 32px;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--warm-tan);
        }

        .sidebar-header p {
            font-size: 11px;
            color: var(--warm-terracotta);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .sidebar-header h3 {
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 500;
            color: var(--warm-brown);
        }

        .step-btn {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            background: transparent;
            border: none;
            color: var(--warm-charcoal);
            font-family: var(--font-body);
            font-size: 15px;
            font-weight: 400;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 6px;
            transition: all 300ms var(--ease-out-quint);
            position: relative;
        }

        .step-btn::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 0;
            background: var(--warm-rust);
            border-radius: 0 2px 2px 0;
            transition: height 250ms var(--ease-out-quint);
        }

        .step-btn:hover {
            background: white;
            box-shadow: var(--shadow-soft);
        }

        .step-btn:hover::before {
            height: 24px;
        }

        .step-btn.active {
            background: white;
            box-shadow: var(--shadow-warm);
        }

        .step-btn.active::before {
            height: 40px;
        }

        .step-btn.completed {
            background: rgba(184, 92, 56, 0.06);
        }

        .step-btn.completed .step-icon {
            background: var(--warm-rust);
            color: white;
        }

        .step-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            box-shadow: var(--shadow-soft);
            transition: all 250ms var(--ease-out-quint);
            flex-shrink: 0;
        }

        .step-btn.active .step-icon {
            background: var(--warm-rust);
            color: white;
            box-shadow: var(--shadow-warm);
        }

        .step-content {
            flex: 1;
            padding-top: 2px;
        }

        .step-content .step-number {
            font-size: 10px;
            color: var(--warm-terracotta);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .step-content .step-name {
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 500;
            color: var(--warm-brown);
            margin-bottom: 4px;
        }

        .step-content p {
            font-size: 13px;
            color: var(--warm-charcoal);
            opacity: 0.7;
            line-height: 1.5;
        }

        /* Main content */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .content-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: var(--shadow-soft);
            max-width: 800px;
            border: 1px solid var(--warm-tan);
        }

        .container-header {
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--warm-beige);
        }

        .container-header h2 {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 500;
            color: var(--warm-brown);
            margin-bottom: 8px;
        }

        .container-header .subtitle {
            font-size: 15px;
            color: var(--warm-charcoal);
            opacity: 0.7;
        }

        .form-group {
            margin-bottom: 28px;
        }

        .form-label {
            display: block;
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 500;
            color: var(--warm-brown);
            margin-bottom: 10px;
        }

        .input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid var(--warm-tan);
            border-radius: 10px;
            font-family: var(--font-body);
            font-size: 16px;
            background: var(--warm-cream);
            transition: all 250ms var(--ease-out-quint);
        }

        .input:focus {
            outline: none;
            border-color: var(--warm-rust);
            background: white;
            box-shadow: 0 0 0 3px rgba(184, 92, 56, 0.1);
        }

        .btn {
            padding: 14px 28px;
            border-radius: 10px;
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 250ms var(--ease-out-quint);
        }

        .btn-primary {
            background: var(--warm-rust);
            color: white;
        }

        .btn-primary:hover {
            background: var(--warm-brown);
            transform: translateY(-2px);
            box-shadow: var(--shadow-warm);
        }

        .btn-secondary {
            background: white;
            color: var(--warm-brown);
            border: 1px solid var(--warm-tan);
        }

        .btn-secondary:hover {
            background: var(--warm-cream);
            border-color: var(--warm-rust);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(107, 127, 89, 0.12);
            color: var(--accent-olive);
            font-family: var(--font-body);
        }

        .status-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .progress-dots {
            display: flex;
            gap: 6px;
            margin-top: 24px;
            justify-content: center;
        }

        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--warm-tan);
            transition: all 250ms var(--ease-out-quint);
        }

        .progress-dot.active {
            background: var(--warm-rust);
            transform: scale(1.3);
        }

        .progress-dot.completed {
            background: var(--accent-olive);
        }

        .variation-label {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--warm-brown);
            color: var(--warm-cream);
            padding: 14px 24px;
            border-radius: 12px;
            font-family: var(--font-display);
            font-size: 15px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const STEPS = [
            { id: 1, name: 'Concept', subtitle: 'Define your content strategy', icon: 'Lightbulb' },
            { id: 2, name: 'Copywriting', subtitle: 'Craft compelling text', icon: 'Type' },
            { id: 3, name: 'Visual Assets', subtitle: 'Create or select images', icon: 'Image' },
            { id: 4, name: 'Video Production', subtitle: 'Edit and produce video', icon: 'Video' },
            { id: 5, name: 'Thumbnail', subtitle: 'Design engaging thumbnails', icon: 'Frame' },
            { id: 6, name: 'Blog Post', subtitle: 'Write supporting article', icon: 'FileText' },
            { id: 7, name: 'Review', subtitle: 'Final quality check', icon: 'CheckCircle' },
            { id: 8, name: 'Publish', subtitle: 'Schedule and publish', icon: 'Calendar' }
        ];

        const Icon = ({ name, size = 18 }) => {
            const icons = {
                Lightbulb: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3L9 14"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>,
                Type: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>,
                Image: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>,
                Video: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="m22 8-6 4 6 4V8Z"/><rect x="2" y="6" width="14" height="12" rx="2"/></svg>,
                Frame: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 8h16"/><path d="M4 16h16"/></svg>,
                FileText: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>,
                CheckCircle: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
                Calendar: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            };
            return icons[name] || null;
        };

        function App() {
            const [currentStep, setCurrentStep] = useState(1);
            const [completedSteps] = useState([1, 2]);

            return (
                <div className="app-layout">
                    <header className="top-nav">
                        <div className="brand">Pink Milk <span>Social Engine</span></div>
                        <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: '20px' }}>
                            <span className="status-badge">● Live Sync</span>
                            <button className="btn btn-primary">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                                Publish Now
                            </button>
                        </div>
                    </header>

                    <div className="app-body">
                        <aside className="sidebar">
                            <div className="sidebar-header">
                                <p>Workflow</p>
                                <h3>Content Campaign</h3>
                            </div>

                            <nav>
                                {STEPS.map((step) => {
                                    const isActive = currentStep === step.id;
                                    const isCompleted = completedSteps.includes(step.id);
                                    
                                    return (
                                        <button
                                            key={step.id}
                                            className={`step-btn ${isActive ? 'active' : ''} ${isCompleted ? 'completed' : ''}`}
                                            onClick={() => setCurrentStep(step.id)}
                                        >
                                            <div className="step-icon">
                                                {isCompleted && !isActive ? (
                                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                                                ) : (
                                                    <Icon name={step.icon} />
                                                )}
                                            </div>
                                            <div className="step-content">
                                                <div className="step-number">Step {step.id}</div>
                                                <div className="step-name">{step.name}</div>
                                                <p>{step.subtitle}</p>
                                            </div>
                                        </button>
                                    );
                                })}
                            </nav>

                            <div className="progress-dots">
                                {STEPS.map((step) => {
                                    const isActive = currentStep === step.id;
                                    const isCompleted = completedSteps.includes(step.id);
                                    return (
                                        <div 
                                            key={step.id}
                                            className={`progress-dot ${isActive ? 'active' : ''} ${isCompleted ? 'completed' : ''}`}
                                        />
                                    );
                                })}
                            </div>
                        </aside>

                        <main className="main-content">
                            <div className="content-container">
                                <div className="container-header">
                                    <h2>{STEPS[currentStep-1].name}</h2>
                                    <div className="subtitle">{STEPS[currentStep-1].subtitle}</div>
                                </div>
                                
                                <div className="form-group">
                                    <label className="form-label">Content Title</label>
                                    <input className="input" placeholder="Enter your content title..." />
                                </div>
                                
                                <div className="form-group">
                                    <label className="form-label">Description</label>
                                    <textarea className="input" rows="4" placeholder="Describe your content strategy..." style={{ resize: 'vertical', minHeight: '120px' }} />
                                </div>

                                <div style={{ display: 'flex', gap: '14px', justifyContent: 'flex-end', marginTop: '40px' }}>
                                    <button className="btn btn-secondary">Previous</button>
                                    <button className="btn btn-primary">Save & Continue</button>
                                </div>
                            </div>
                        </main>
                    </div>

                    <div className="variation-label">Direction B: Warm Editorial</div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
